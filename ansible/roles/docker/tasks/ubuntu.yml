- name: Installing needed dependencies
  package:
    name: "{{ item }}"
    state: present
  become_user: root
  with_items:
    - apt-transport-https
    - ca-certificates
    - gnupg-agent
    - software-properties-common

- name: Add docker repository GPG key
  become_user: root
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add apt repostitory
  become_user: root
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    update_cache: yes

- name: Installing docker
  become_user: root
  package:
    name: "{{ item }}"
    state: present
  with_items:
    - docker-ce
    - docker-ce-cli
    - containerd.io

